<template>
  <lightning-card title="Template Getter Example">
    <div class="slds-p-around_medium">
      <template if:true={hasRows}>
        <template for:each={decoratedRows} for:item="row">
          <div key={row.key} class={row.cssClass}>
            <strong>{row.displayName}</strong>
            <span>{row.statusLabel}</span>
          </div>
        </template>
      </template>

      <template if:false={hasRows}>
        <p>No rows are available.</p>
      </template>
    </div>
  </lightning-card>
</template>
