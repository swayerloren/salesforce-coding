<template>
  <lightning-card title="Related Files">
    <div class="slds-p-horizontal_medium slds-p-bottom_medium">
      <lightning-button-icon
        icon-name="utility:refresh"
        alternative-text="Refresh files"
        title="Refresh files"
        onclick={handleRefresh}
        disabled={isRefreshing}>
      </lightning-button-icon>

      <template if:true={hasFiles}>
        <ul class="slds-m-top_medium">
          <template for:each={files} for:item="file">
            <li key={file.contentDocumentId} class="slds-p-vertical_x-small">
              <lightning-button
                label={file.title}
                variant="base"
                data-id={file.contentDocumentId}
                onclick={handleOpenFile}>
              </lightning-button>
            </li>
          </template>
        </ul>
      </template>

      <template if:false={hasFiles}>
        <p class="slds-m-top_medium">No files found.</p>
      </template>
    </div>
  </lightning-card>
</template>
